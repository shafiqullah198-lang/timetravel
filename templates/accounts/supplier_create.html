{% extends "erp/base.html" %}
{% block title %}Add Supplier | Travel ERP{% endblock %}
{% block page_title %}Add Supplier{% endblock %}
{% block page_subtitle %}Create a supplier profile for purchases and payables{% endblock %}

{% block content %}
<form method="post" class="erp-panel p-5 max-w-3xl">
    {% csrf_token %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="erp-label block mb-1">Company Name</label>
            <input type="text" name="company_name" required value="{{ form_data.company_name|default:'' }}" class="erp-input w-full px-3 py-2">
        </div>
        <div>
            <label class="erp-label block mb-1">Phone</label>
            <input type="text" name="phone" required value="{{ form_data.phone|default:'' }}" class="erp-input w-full px-3 py-2">
        </div>
        <div>
            <label class="erp-label block mb-1">Contact Person</label>
            <input type="text" name="contact_person" value="{{ form_data.contact_person|default:'' }}" class="erp-input w-full px-3 py-2">
        </div>
        <div>
            <label class="erp-label block mb-1">Email</label>
            <input type="email" name="email" value="{{ form_data.email|default:'' }}" class="erp-input w-full px-3 py-2">
        </div>
        <div class="md:col-span-2">
            <label class="erp-label block mb-1">Bank Details</label>
            <textarea name="bank_details" rows="3" class="erp-input w-full px-3 py-2">{{ form_data.bank_details|default:'' }}</textarea>
        </div>
    </div>
    <div class="mt-5 flex gap-2">
        <button class="bg-blue-600 hover:bg-blue-500 text-white rounded-lg px-5 py-2">Save Supplier</button>
        <a href="{% url 'supplier_payable' %}" class="px-4 py-2 rounded-lg bg-slate-200 hover:bg-slate-300 text-slate-800">Cancel</a>
    </div>
</form>
{% endblock %}
