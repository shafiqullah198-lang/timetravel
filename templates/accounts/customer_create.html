{% extends "erp/base.html" %}
{% block title %}Add Customer | Travel ERP{% endblock %}
{% block page_title %}Add Customer{% endblock %}
{% block page_subtitle %}Create a customer profile for ticketing and receivables{% endblock %}

{% block content %}
<form method="post" class="erp-panel p-5 max-w-3xl">
    {% csrf_token %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="erp-label block mb-1">Customer Name</label>
            <input type="text" name="name" required value="{{ form_data.name|default:'' }}" class="erp-input w-full px-3 py-2">
        </div>
        <div>
            <label class="erp-label block mb-1">Phone</label>
            <input type="text" name="phone" required value="{{ form_data.phone|default:'' }}" class="erp-input w-full px-3 py-2">
        </div>
        <div>
            <label class="erp-label block mb-1">CNIC / Passport</label>
            <input type="text" name="cnic_passport" value="{{ form_data.cnic_passport|default:'' }}" class="erp-input w-full px-3 py-2">
        </div>
        <div>
            <label class="erp-label block mb-1">Email</label>
            <input type="email" name="email" value="{{ form_data.email|default:'' }}" class="erp-input w-full px-3 py-2">
        </div>
    </div>
    <div class="mt-5 flex gap-2">
        <button class="bg-blue-600 hover:bg-blue-500 text-white rounded-lg px-5 py-2">Save Customer</button>
        <a href="{% url 'customer_udar' %}" class="px-4 py-2 rounded-lg bg-slate-200 hover:bg-slate-300 text-slate-800">Cancel</a>
    </div>
</form>
{% endblock %}
